name: Deploy nodyx-docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'nodyx-docs/**'
      - '.github/workflows/docs-deploy.yml'

jobs:
  deploy:
    name: Build & deploy to nodyx.dev
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            set -euo pipefail

            cd /var/www/nexus

            echo "── git pull ──"
            git pull origin main

            echo "── npm install ──"
            cd nodyx-docs
            npm ci --prefer-offline

            echo "── build ──"
            npm run build

            echo "── restart ──"
            sudo -u nodyx PM2_HOME=/home/nodyx/.pm2 pm2 restart nodyx-docs

            echo "── done ──"
            sudo -u nodyx PM2_HOME=/home/nodyx/.pm2 pm2 show nodyx-docs | grep -E "status|restart"

