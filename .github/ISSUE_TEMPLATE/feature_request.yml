name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it. Nodyx is built by its community.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Nodyx would this affect?
      options:
        - Frontend / UI
        - Backend API
        - Voice / WebRTC
        - Canvas
        - Forum
        - Chat
        - Homepage Builder / Widgets
        - P2P / Federation
        - Installer / Deployment
        - Documentation
        - New module idea
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why do you need it?
      placeholder: "I'm frustrated when... / It would be great if..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered other approaches?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would significantly improve my experience
        - Blocking — I can't use Nodyx without this

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to similar features in other tools...
